apiVersion: v1
kind: Namespace
metadata:
  name: demand-forecast-prod

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: model-config
  namespace: demand-forecast-prod
data:
  config.yaml: |
    model:
      name: demand_forecast_ensemble
      version: latest
      batch_size: 32
    serving:
      port: 8000
      workers: 4
    monitoring:
      drift_threshold: 0.05
      performance_threshold: 0.85

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-serving
  namespace: demand-forecast-prod
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: demand-forecast
      component: serving
  template:
    metadata:
      labels:
        app: demand-forecast
        component: serving
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: api
        image: demand-forecast/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: MODEL_PATH
          value: "/models/latest"
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: redis-config
              key: host
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: model-storage
          mountPath: /models
        - name: config-volume
          mountPath: /app/configs
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-pvc
      - name: config-volume
        configMap:
          name: model-config

---
apiVersion: v1
kind: Service
metadata:
  name: model-serving
  namespace: demand-forecast-prod
spec:
  selector:
    app: demand-forecast
    component: serving
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: LoadBalancer

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: model-serving-hpa
  namespace: demand-forecast-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: model-serving
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Pods
    pods:
      metric:
        name: requests_per_second
      target:
        type: AverageValue
        averageValue: 100

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demand-forecast-ingress
  namespace: demand-forecast-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - api.demand-forecast.com
    secretName: demand-forecast-tls
  rules:
  - host: api.demand-forecast.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: model-serving
            port:
              number: 8000