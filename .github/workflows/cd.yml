name: CD

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to the pushed git tag)"
        required: false

permissions:
  contents: read
  packages: read
  id-token: write   # for OIDC -> cloud auth, if used

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/demand-forecast

jobs:
  # -------------------------------------------------------------------------
  build-release:
    name: Build & push release image
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.tag.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || github.ref_name }}"
          echo "image_ref=${{ env.IMAGE }}:${TAG}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.image_ref }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
      - name: Sign image with cosign (keyless)
        uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes ${{ steps.tag.outputs.image_ref }}

  # -------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-release
    environment:
      name: staging
      url: https://staging-api.demand-forecast.internal
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kubeconfig
      - name: Deploy
        env:
          KUBECONFIG: /home/runner/.kubeconfig
        run: |
          make k8s-deploy IMAGE=${{ needs.build-release.outputs.image_ref }} K8S_NAMESPACE=demand-forecast-staging
      - name: Smoke test staging
        run: |
          pip install requests
          python scripts/smoke_test.py --host https://staging-api.demand-forecast.internal
      - name: Rollback on failure
        if: failure()
        env:
          KUBECONFIG: /home/runner/.kubeconfig
        run: make k8s-rollback K8S_NAMESPACE=demand-forecast-staging

  # -------------------------------------------------------------------------
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production   # protected environment: requires manual approval
      url: https://api.demand-forecast.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kubeconfig
      - name: Canary rollout (10% traffic)
        env:
          KUBECONFIG: /home/runner/.kubeconfig
        run: |
          make k8s-deploy IMAGE=${{ needs.build-release.outputs.image_ref }} K8S_NAMESPACE=demand-forecast-prod
      - name: Post-deploy smoke test
        run: |
          pip install requests
          python scripts/smoke_test.py --host https://api.demand-forecast.example.com --retries 15 --delay 5
      - name: Bake period - watch error budget
        run: sleep 120
      - name: Verify error rate via Prometheus API
        run: |
          pip install requests
          python scripts/check_error_budget.py \
            --prometheus-url ${{ secrets.PROMETHEUS_URL }} \
            --max-error-rate 0.02
      - name: Rollback on failure
        if: failure()
        env:
          KUBECONFIG: /home/runner/.kubeconfig
        run: make k8s-rollback K8S_NAMESPACE=demand-forecast-prod
      - name: Notify on rollback
        if: failure()
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d '{"text":"🔴 Production deploy of demand-forecast FAILED and was rolled back. Check GitHub Actions run '"${{ github.run_id }}"'."}' || true
