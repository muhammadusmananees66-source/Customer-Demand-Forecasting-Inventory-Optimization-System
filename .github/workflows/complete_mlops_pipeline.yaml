name: Complete MLOps Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_NAME: ${{ github.repository }}
  KUBE_NAMESPACE: demand-forecast-prod
  MLFLOW_TRACKING_URI: http://mlflow-service:5000

jobs:
  # ============================================
  # SETUP - Shared steps
  # ============================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=$(sha256sum uv.lock | cut -d' ' -f1)" >> $GITHUB_OUTPUT

  # ============================================
  # INSTALL DEPENDENCIES - Reusable step
  # ============================================
  install-deps:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (cross-platform)
        run: |
          source .venv/bin/activate
          # Try sync with universal flag (skips incompatible packages like pywin32 on Linux)
          uv pip sync uv.lock --universal || uv pip install -r requirements-uv.txt
      
      - name: Verify installation
        run: |
          source .venv/bin/activate
          uv pip check || true  # Don't fail if some packages are platform-specific

  # ============================================
  # Stage 1: Data Sources
  # ============================================
  data-sources:
    needs: install-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (cross-platform)
        run: |
          source .venv/bin/activate
          uv pip sync uv.lock --universal || uv pip install -r requirements-uv.txt
      
      - name: Fetch data sources
        run: |
          source .venv/bin/activate
          make data-sources
      
      - name: Upload data
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/raw/

  # ============================================
  # Stage 2: Ingestion
  # ============================================
  ingestion:
    needs: [install-deps, data-sources]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (cross-platform)
        run: |
          source .venv/bin/activate
          uv pip sync uv.lock --universal || uv pip install -r requirements-uv.txt
      
      - name: Start Kafka
        run: docker-compose up -d kafka zookeeper
      
      - name: Run ingestion
        run: |
          source .venv/bin/activate
          make ingestion
      
      - name: Upload ingested data
        uses: actions/upload-artifact@v4
        with:
          name: ingested-data
          path: data/ingested/

  # ============================================
  # Stage 3: Data Lake
  # ============================================
  data-lake:
    needs: [install-deps, ingestion]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (cross-platform)
        run: |
          source .venv/bin/activate
          uv pip sync uv.lock --universal || uv pip install -r requirements-uv.txt
      
      - name: Setup MinIO
        run: docker-compose up -d minio
      
      - name: Store in data lake
        run: |
          source .venv/bin/activate
          make data-lake

  # ============================================
  # Stage 4: Validation & EDA
  # ============================================
  validation:
    needs: [install-deps, data-lake]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (cross-platform)
        run: |
          source .venv/bin/activate
          uv pip sync uv.lock --universal || uv pip install -r requirements-uv.txt
      
      - name: Run validation
        run: |
          source .venv/bin/activate
          make validation
      
      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: reports/validation/

  # ============================================
  # Stage 5: Preprocessing
  # ============================================
  preprocessing:
    needs: [install-deps, validation]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (cross-platform)
        run: |
          source .venv/bin/activate
          uv pip sync uv.lock --universal || uv pip install -r requirements-uv.txt
      
      - name: Run preprocessing
        run: |
          source .venv/bin/activate
          make preprocessing
      
      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/

  # ============================================
  # Stage 6: Feature Store
  # ============================================
  feature-store:
    needs: [install-deps, preprocessing]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (cross-platform)
        run: |
          source .venv/bin/activate
          uv pip sync uv.lock --universal || uv pip install -r requirements-uv.txt
      
      - name: Setup Redis
        run: docker-compose up -d redis
      
      - name: Build feature store
        run: |
          source .venv/bin/activate
          make feature-store

  # ============================================
  # Stage 7: Training
  # ============================================
  training:
    needs: [install-deps, feature-store]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (cross-platform)
        run: |
          source .venv/bin/activate
          uv pip sync uv.lock --universal || uv pip install -r requirements-uv.txt
      
      - name: Train models
        run: |
          source .venv/bin/activate
          make training
      
      - name: Upload models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/

  # ============================================
  # Stage 8: Evaluation & Tuning
  # ============================================
  evaluation:
    needs: [install-deps, training]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (cross-platform)
        run: |
          source .venv/bin/activate
          uv pip sync uv.lock --universal || uv pip install -r requirements-uv.txt
      
      - name: Evaluate models
        run: |
          source .venv/bin/activate
          make evaluation
      
      - name: Upload evaluation reports
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: reports/evaluation/

  # ============================================
  # Stage 9: MLflow Registry
  # ============================================
  mlflow-registry:
    needs: [install-deps, evaluation]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (cross-platform)
        run: |
          source .venv/bin/activate
          uv pip sync uv.lock --universal || uv pip install -r requirements-uv.txt
      
      - name: Setup MLflow
        run: docker-compose up -d mlflow postgres
      
      - name: Register models
        run: |
          source .venv/bin/activate
          make mlflow-registry

  # ============================================
  # Stage 10: Docker Build
  # ============================================
  docker-build:
    needs: [install-deps, mlflow-registry]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        run: make docker-build

  # ============================================
  # Stage 11: Kubernetes Deploy
  # ============================================
  k8s-deploy:
    needs: [install-deps, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Deploy to K8s
        run: make k8s-deploy

  # ============================================
  # Stage 12: Monitoring
  # ============================================
  monitoring:
    needs: [install-deps, k8s-deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (cross-platform)
        run: |
          source .venv/bin/activate
          uv pip sync uv.lock --universal || uv pip install -r requirements-uv.txt
      
      - name: Setup monitoring
        run: |
          source .venv/bin/activate
          make monitoring

  # ============================================
  # Stage 13: Drift Detection
  # ============================================
  drift-detection:
    needs: [install-deps, monitoring]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (cross-platform)
        run: |
          source .venv/bin/activate
          uv pip sync uv.lock --universal || uv pip install -r requirements-uv.txt
      
      - name: Setup drift detection
        run: |
          source .venv/bin/activate
          make drift-detection

  # ============================================
  # Stage 14: Retraining Pipeline
  # ============================================
  retraining:
    needs: [install-deps, drift-detection]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (cross-platform)
        run: |
          source .venv/bin/activate
          uv pip sync uv.lock --universal || uv pip install -r requirements-uv.txt
      
      - name: Setup retraining
        run: |
          source .venv/bin/activate
          make retraining

  # ============================================
  # Final Status
  # ============================================
  finalize:
    needs: [install-deps, data-sources, ingestion, data-lake, validation, preprocessing,
            feature-store, training, evaluation, mlflow-registry, docker-build,
            k8s-deploy, monitoring, drift-detection, retraining]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "✅ Complete MLOps Pipeline Finished!"
          echo "All 14 stages completed successfully!"
          echo "Dependencies installed from uv.lock"