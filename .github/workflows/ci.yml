# .github/workflows/ci.yml
# ============================================================
# PRODUCTION-GRADE CI/CD PIPELINE
# Senior MLOps Engineer - 2026 Standard
# ============================================================

name: CI/CD Pipeline

on:
  push:
    # branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: demand-forecast
  UV_VERSION: "latest"

# ============================================================
# PERMISSIONS - LEAST PRIVILEGE PRINCIPLE
# ============================================================
permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

jobs:
  # ============================================================
  # LINTING & STATIC ANALYSIS
  # ============================================================
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (frozen)
        run: uv sync --all-extras --dev --frozen

      - name: Run lint (ruff)
        run: uv run ruff check src tests

      - name: Run format check (black)
        run: uv run black --check src tests

      - name: Run import check (isort)
        run: uv run isort --check-only src tests

      - name: Run type check (mypy)
        run: uv run mypy src

      - name: Bandit (SAST)
        run: uv run bandit -r src -ll -x tests -f json -o bandit-report.json || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ============================================================
  # UNIT TESTS
  # ============================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (frozen)
        run: uv sync --all-extras --dev --frozen

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run unit tests
        run: |
          uv run pytest tests/unit -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            --junitxml=reports/unit-junit.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            coverage.xml
            reports/unit-junit.xml

      - name: Publish test summary
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: reports/unit-junit.xml
          github_token: ${{ secrets.GITHUB_TOKEN }}
          check_name: Unit Test Results
          comment_title: Unit Test Results
          comment_mode: always
          fail_on: test failures
          action_fail: true
          action_fail_on_inconclusive: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ============================================================
  # INTEGRATION TESTS
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-tests]
    permissions:
      contents: read
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-start-period 15s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clear action cache
        run: |
          rm -rf ~/.cache/actions

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (frozen)
        run: uv sync --all-extras --dev --frozen

      - name: Start MLflow (docker compose)
        run: docker compose -f docker-compose.integration.yml up -d mlflow

      - name: Wait for services
        run: |
          chmod +x scripts/wait_for_services.sh
          ./scripts/wait_for_services.sh
        env:
          TIMEOUT: "90"

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run integration tests
        run: |
          INTEGRATION_TESTS=1 \
          MLFLOW_HTTP_REQUEST_TIMEOUT=5 \
          MLFLOW_HTTP_REQUEST_MAX_RETRIES=1 \
          uv run pytest tests/integration -v -m integration \
            --timeout=60 \
            --timeout-method=thread \
            --junitxml=reports/integration-junit.xml

      - name: Upload integration test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: reports/integration-junit.xml

      - name: Teardown services
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v

  # ============================================================
  # SECURITY SCANNING
  # ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (frozen)
        run: uv sync --all-extras --dev --frozen

      - name: Run safety check
        run: uv run safety check --json > safety-report.json || true

      - name: Upload safety report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-report
          path: safety-report.json

  # ============================================================
  # DOCKER BUILD & SCAN
  # ============================================================
  docker-build:
    name: Build & Scan Image
    runs-on: ubuntu-latest
    needs: [unit-tests]
    permissions:
      contents: read
      security-events: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (not pushed)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step A: produce the report. exit-code 0 here on purpose - this step's
      # only job is generating trivy-results.sarif as a downloadable artifact,
      # even if findings exist. Gating happens in the next step, separately.
      - name: Trivy scan (generate SARIF report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-report
          path: trivy-results.sarif

      # Step B: the actual gate. Same scan, human-readable table output,
      # fails the job if anything HIGH/CRITICAL and unfixed-excluded remains.
      # trivyignores lets you accept specific CVEs with a reason, instead of
      # disabling the gate entirely.
      - name: Trivy scan (enforce - fails build on real findings)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

  # ============================================================
  # PUBLISH IMAGE
  # ============================================================
  publish:
    name: Publish Image
    runs-on: ubuntu-latest
    needs: [integration-tests, docker-build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # DEPLOY TO STAGING (ephemeral kind cluster - portfolio/demo)
  # ============================================================
  # NOTE: This cluster exists only for the lifetime of this job. It proves
  # the manifests are valid and the app comes up healthy - it is NOT a
  # persistent environment. There is no real staging.example.com. To get a
  # real persistent staging environment, provision an actual cluster (EKS/
  # GKE/AKS/DO) later and switch this back to a KUBE_CONFIG secret + real
  # `kubectl apply` against it.
  deploy-staging:
    name: Deploy to Staging (ephemeral kind cluster)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [publish]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: staging

      - name: Log in to GHCR (to pull the image just published)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image and load into kind
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          docker pull "$IMAGE"
          kind load docker-image "$IMAGE" --name staging

      - name: Create placeholder secret (smoke-test only - not a real secret)
        run: |
          kubectl create secret generic demand-forecast-secrets \
            --from-literal=jwt-secret="smoke-test-only-not-for-real-use"

      - name: Deploy core manifests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          kubectl apply -f k8s/configmap.yaml
          sed "s|__IMAGE__|$IMAGE|g" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/demand-forecast-api --timeout=120s

      - name: Debug - dump pod status on failure    
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -o wide
          echo "=== Describe pods ==="
          kubectl describe pods -l app=demand-forecast-api
          echo "=== Pod logs ==="
          kubectl logs -l app=demand-forecast-api --all-containers --tail=200 || true
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp'

      - name: Run smoke tests
        run: |
          kubectl port-forward svc/demand-forecast-api 8080:80 &
          sleep 5
          curl -f http://localhost:8080/health

      - name: Cleanup
        if: always()
        run: kind delete cluster --name staging

  # ============================================================
  # DEPLOY TO PRODUCTION (ephemeral kind cluster - portfolio/demo)
  # ============================================================
  # NOTE: Same caveat as staging above - this is a fresh, disposable cluster
  # created and destroyed within this job. It demonstrates the deploy works,
  # it does not leave anything running afterward.
  deploy-production:
    name: Deploy to Production (ephemeral kind cluster)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: read
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: production

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image and load into kind
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
        run: |
          docker pull "$IMAGE"
          kind load docker-image "$IMAGE" --name production

      - name: Create placeholder secret (smoke-test only - not a real secret)
        run: |
          kubectl create secret generic demand-forecast-secrets \
            --from-literal=jwt-secret="smoke-test-only-not-for-real-use"
      - name: Deploy core manifests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
        run: |
          kubectl apply -f k8s/configmap.yaml
          sed "s|__IMAGE__|$IMAGE|g" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/demand-forecast-api --timeout=120s

      - name: Debug - dump pod status on failure     
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -o wide
          echo "=== Describe pods ==="
          kubectl describe pods -l app=demand-forecast-api
          echo "=== Pod logs ==="
          kubectl logs -l app=demand-forecast-api --all-containers --tail=200 || true
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp'

      - name: Run smoke tests
        run: |
          kubectl port-forward svc/demand-forecast-api 8080:80 &
          sleep 5
          curl -f http://localhost:8080/health

      - name: Cleanup
        if: always()
        run: kind delete cluster --name production

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false