version: '3.8'

services:
  # Streaming Layer
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - mlops-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
    networks:
      - mlops-network

  # Storage Layer
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    networks:
      - mlops-network

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    networks:
      - mlops-network

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    ports:
      - "5432:5432"
    networks:
      - mlops-network

  # MLflow
  mlflow:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.mlflow
    depends_on:
      - postgres
      - minio
    ports:
      - "5000:5000"
    environment:
      BACKEND_URI: postgresql://mlflow:mlflow@postgres/mlflow
      ARTIFACT_ROOT: s3://mlflow/artifacts
    networks:
      - mlops-network

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - mlops-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - mlops-network

  evidently:
    image: evidently/evidently:latest
    ports:
      - "8085:8085"
    networks:
      - mlops-network

  # Jupyter
  jupyter:
    image: jupyter/datascience-notebook:latest
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    networks:
      - mlops-network

networks:
  mlops-network:
    driver: bridge